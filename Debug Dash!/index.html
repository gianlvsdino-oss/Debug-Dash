<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/Css/Index.css">
    <link rel="icon" type="image/svg+xml" href="/Pics/dd-favicon.svg">
    <script type="module" src="/Js/Index.js" defer></script>
    <title>Debug Dash!</title>
</head>
<body>
    <div class="left" id="title-left" aria-hidden="true">
        <span>Debug</span>
        <span>Dash!</span>
    </div>
    <div class="right show" id="title-right" aria-hidden="true">
        <span>Debug</span><span>Dash!</span>
    </div>
    <div class="box1" id="box1">
        <h1>Log In</h1>
        <div class="fill1">
            <input type="text" placeholder="Username:" id="user1">
            <div class="password-container">
                <input type="password" placeholder="Password:" id="pass1">
                <button type="button" class="toggle-password" id="toggle1">👁️</button>
            </div>
            <input type="button" value="Log In" id="btn1">
        </div>
        <div class="or"><span></span><p>or</p><span></span></div>
        <div class="btns">
            <button id="googlelog" type="button"><img src="/Pics/google.png" alt="google">Google</button>
            <button id="guestlog" type="button"><img src="/Pics/profile.png" alt="guest">Guest</button>
        </div>
        <a href="#" id="create">Create an account?</a>
    </div>
    <div class="box2" id="box2">
        <h1>Sign In</h1>
        <div class="fill2">
            <input type="text" placeholder="Gmail:" id="gmail2">
            <input type="text" placeholder="Username:" id="user2">
            <div class="password-container">
                <input type="password" placeholder="Password:" id="pass2">
                <button type="button" class="toggle-password" id="toggle2">👁️</button>
            </div>
            <input type="button" value="Sign In" id="btn2">
        </div>
        <div class="or"><span></span><p>or</p><span></span></div>
        <div class="btns">
            <button id="googlesign" type="button"><img src="/Pics/google.png" alt="google">Google</button>
            <button id="guestsign" type="button"><img src="/Pics/profile.png" alt="guest">Guest</button>
        </div>
        <a href="#" id="already">Already have an account?</a>
    </div>
</body>
</html>
