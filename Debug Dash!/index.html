<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/Css/Index.css">
    <link rel="icon" type="image/svg+xml" href="/Pics/dd-favicon.svg">
    <script type="module" src="/Js/Index.js" defer></script>
    <title>Debug Dash!</title>
</head>
<body>
    <div class="box1" id="box1">
        <h1>Log In</h1>
        <div class="fill1">
            <input type="text" placeholder="Username:" id="user1">
            <input type="text" placeholder="Password:" id="pass1">
            <input type="button" value="Log In" id="btn1">
        </div>
        <div class="or"><span></span><p>or</p><span></span></div>
        <div class="btns">
            <button id="googlelog" onclick="signInWithGoogle()"><img src="/Pics/google.png" alt="google">Google</button>
            <button id="guestlog" onclick="guestLogin()"><img src="/Pics/profile.png" alt="guest">Guest</button>
        </div>
        <a href="#" id="create">Create an account?</a>
    </div>
    <div class="box2" id="box2">
        <h1>Sign In</h1>
        <div class="fill2">
            <input type="text" placeholder="Gmail:" id="gmail2">
            <input type="text" placeholder="Username:" id="user2">
            <input type="text" placeholder="Password:" id="pass2">
            <input type="button" value="Sign In" id="btn2">
        </div>
        <div class="or"><span></span><p>or</p><span></span></div>
        <div class="btns">
            <button id="googlesign" onclick="signInWithGoogle()"><img src="/Pics/google.png" alt="google">Google</button>
            <button id="guestsign" onclick="guestLogin()"><img src="/Pics/profile.png" alt="guest">Guest</button>
        </div>
        <a href="#" id="already">Already have an account?</a>
    </div>
</body>
</html>
