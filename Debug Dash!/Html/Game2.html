<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Css/Game2.css">
    <link rel="icon" type="image/svg+xml" href="/Pics/dd-favicon.svg">
    <script type="module" src="/Js/Game2.js" defer></script>
    <title>Debug Dash!</title>
</head>
<body>
    <div class="box1">
        <h1>Debug <span>Dash!</span></h1>
        <div class="levelnlang">
            <p id="language">HTML</p>
        </div>
        <div class="timenheart">
            <p>Time: </p>
            <img src="/Pics/loop.png" alt="infinity">
        </div>
        <div class="hearts" id="hearts">
                <p id="heart1">&#10084;</p>
                <p id="heart2">&#10084;</p>
                <p id="heart3">&#10084;</p>
        </div>
        <img src="/Pics/streak.png" alt="streak" class="streak">
        <p id="streak">0</p>
    </div>
    <div class="box2">
        <h3>Analyze The Error Code</h3>
        <div class="quest">
            <pre id="error"></pre>
        </div>
    </div>
    <div class="btns1">
        <button class="choice" id="btn1"></button>
        <button class="choice" id="btn2"></button>
    </div>
    <div class="btns2">
        <button class="choice" id="btn3"></button>
        <button class="choice" id="btn4"></button>
    </div>
    <img src="/Pics/back-button.png" alt="Back" id="back">
    <div id="levels"></div>
    <div class="popup" id="popup">
        <h1>Level Complete</h1>
        <p id="explain">.</p>
        <button id="goselect">Back</button>
    </div>
    <div class="lose" id="lose">
        <h1>nice try!</h1>
        <div class="btns">
            <button id="try" onclick="resetGame()">Try again?</button>
            <button id="select">Back</button>
        </div>
    </div>
</body>
</html>
